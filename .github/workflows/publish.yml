name: Publish to GitHub Packages

# Publishes @skipleague/design to GitHub Packages. Trigger by pushing a version tag
# (e.g. v0.3.0) or from the Actions tab ("Run workflow"). Uses the built-in
# GITHUB_TOKEN — no manual secret needed to publish a package owned by this org.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@skipleague"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
