name: Test

# Component tests (Vitest + Testing Library) and a Storybook build on every PR /
# push to main. The Storybook build fails the job if any story stops compiling,
# giving us visual-review coverage of the shared components.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Component tests
        run: npm test
      - name: Storybook build
        run: npm run build-storybook
